<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garmin Training Log</title>
    <link rel="stylesheet" href="src/css/style.css" />
    <link rel="stylesheet" href="src/css/log.css" />
  </head>
  <body>
    <main class="app-container">
      <h1 class="app-header">Garmin Training Log</h1>
      <a href="index.html" class="link-button">Home</a>

      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="running">Running</button>
        <button class="filter-btn" data-filter="lap_swimming">Swimming</button>
        <button class="filter-btn" data-filter="paddelball">Paddelball</button>
        <button class="filter-btn" data-filter="cycling">Cycling</button>
        <button class="filter-btn" data-filter="multi_sport">Multi Sport</button>
        <button class="filter-btn" data-filter="hiking">Hiking</button>
        <button class="filter-btn" data-filter="other">Other</button>
      </div>


      <div id="status-container">
        <p class="loading">Loading activities...</p>
      </div>
      <table class="activities-table">
        <thead>
            <tr>
              <th data-sort="date">Date</th>
              <th data-sort="type">Type</th>
              <th data-sort="distance">Distance</th>
              <th data-sort="duration">Duration</th>
              <th data-sort="pace">Pace</th>
              <th data-sort="hr">Average HR</th>
            </tr>
          </thead>
        <tbody id="activities-tbody"></tbody>
      </table>
    </main>
    <script type="module" src="/src/ts/log.ts"></script>
  </body>
</html>
